name: CI/CD لبناء تطبيق الإيماءات

on:
  push: # يتم التشغيل تلقائياً عند رفع أي كود جديد
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 1. تحميل الكود

      - uses: subosito/flutter-action@v2 # 2. تجهيز بيئة Flutter
        with:
          flutter-version: '3.16.0'

      - run: flutter pub get # 3. تحميل المكتبات
      - run: flutter build apk --release # 4. بناء التطبيق

      - uses: actions/upload-artifact@v4 # 5. رفع ملف APK كنتاج
        with:
          name: gesture-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
